server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # react-router uses BrowserRouter (client-side routing) — any path that
    # isn't a real file falls back to index.html so deep links work.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
